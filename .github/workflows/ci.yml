name: CI - Build & Push to ECR

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: |
          docker build -t frontend ./services/frontend

      - name: Tag image
        run: |
          docker tag frontend:latest 436083576844.dkr.ecr.us-east-1.amazonaws.com/frontend:latest

      - name: Push to ECR
        run: |
          docker push 436083576844.dkr.ecr.us-east-1.amazonaws.com/frontend:latest