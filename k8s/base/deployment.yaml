apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: 436083576844.dkr.ecr.us-east-1.amazonaws.com/frontend:fc26c20714999bea860df4e6f952dfc9eea524ee
          ports:
            - containerPort: 5000